services:
  db:
    image: postgres:16
    container_name: budgee_db
    environment:
      POSTGRES_USER: budgee
      POSTGRES_PASSWORD: budgee
      POSTGRES_DB: budgee
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: budgee_redis
    ports:
      - "6379:6379"

volumes:
  db_data:
